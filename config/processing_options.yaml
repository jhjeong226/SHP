# 데이터 루트 경로 — 여기만 바꾸면 모든 관측소에 적용됨
# 하위 구조: {data_root}/{station_id}/raw/crnp/
#                                      raw/fdr/
#                                      processed/
data_root: "E:/02.Data/05.CRNP/03.SHP_Calibration/SHP/data"

corrections:
  incoming_flux: true   # fi: 입사 우주선 강도 보정
  pressure:      true   # fp: 기압 보정
  humidity:      true   # fw: 절대습도 보정
  biomass:       false  # fb: 바이오매스 보정 (미구현)

calibration:
  methods: ["standard", "shp_joint", "shp_2pt"]  # 실행할 방법 목록
  optimization_method: "Nelder-Mead"
  initial_N0: 1000
  shp_2pt_percentile: 10   # 건조/습윤 대표값 추출 백분위수

calculation:
  exclude_months: [11, 12, 1, 2]   # 동절기 제외
  custom_exclude_dates: []          # ["2024-06-15:2024-06-20"]
  smoothing:
    enabled: false
    window: 11
    order: 3

visualization:
  dpi: 150
  figure_size: [18, 12]

logging:
  level: "INFO"   # DEBUG / INFO / WARNING
# config/processing_options.yaml
# ============================================================
# 전처리 ~ 교정 ~ 산출 전 단계의 공통 설정
# ============================================================

data_root: "E:/02.Data/05.CRNP/03.SHP_Calibration/SHP/data"

preprocessing:
  fdr:
    csv_header_rows: 3
    csv_theta_cols: [1, 3, 5]
    timestamp_format: "%m/%d/%Y %I:%M:%S %p"
    filter_on_hour: true
    theta_min: 0.0
    theta_max: 1.0
    min_obs_daily: 6

  crnp:
    ta_range:  [-40,  60]
    rh_range:  [  0, 110]
    pa_range:  [800, 1300]
    interp_method: "pchip"
    interp_limit_hours: 24
    pressure_scale_height: 130.0
    humidity_coeff: 0.0054
    mad_threshold: 3.0
    min_obs_daily: 6
    dat_file_pattern: null
    n_daily_min: null
    n_daily_max: null

corrections:
  incoming_flux: true
  pressure:      true
  humidity:      true
  biomass:       false

calibration: #"standard", "shp_joint", "shp_2pt", "uts", "shp_opt"
  methods: ["shp_opt"]

  # VWC를 산출할 전체 기간 (null이면 전체 데이터 사용)
  analysis_start: "2025-04-01"
  analysis_end:   "2025-10-31"

  # 교정 파라미터(N0, a2, ND)를 결정하는 기간 (공통 기본값)
  calibration_start: "2025-04-01"
  calibration_end:   "2025-10-31"

  # 3월 포함: 결빙이 완전히 해소되지 않은 경우가 많음
  exclude_months: [11, 12, 1, 2, 3]

  reference_depths: [10]

  standard:
    # calibration_start/end: null  # null이면 공통값 사용
    # exclude_months: null
    rmse_target: "theta_field"
    n0_bounds: [300, 5000]

  shp_joint:
    # calibration_start/end: null
    # exclude_months: null
    rmse_target: "theta_field"
    a2_bounds: [0.0, 0.5]
    n0_bounds: [300, 5000]

  shp_2pt:
    # calibration_start/end: null
    # exclude_months: null   # 식생 휴면기만: [3,4,5,6,7,8,11,12,1,2]
    window_days:     60
    step_days:        7
    dry_percentile:  10
    wet_percentile:  90
    min_theta_diff: 0.03
    a2_min: 0.0
    a2_max: 0.5

  # ── SHP-Opt (무강우 건조기 이벤트 기반, 최솟값 가설) ─────
  shp_opt:
    # calibration_start/end: null  # null이면 공통값 사용
    # exclude_months: null         # null이면 공통값 사용

    # 계절 격리: 이 월만 허용 (null이면 전체 교정 기간 사용)
    # 권장: [9, 10] — 낙엽 후 동결 전, DHP_veg 최소 시기
    season_months: null

    # 강수 데이터 경로 (null이면 matched_df rain 컬럼 → 없으면 단조감소만 적용)
    rain_path: null

    # ── 이벤트 탐색 ────────────────────────────────────────────
    # QC 조건 1: 강수 — window 내 rain >= min_rain_mm 이면 폐기
    # QC 조건 2: 단조감소 — 매일 θ[k] > θ[k+1] 엄격히 감소해야 통과
    window_days:      5    # Point1(습윤단) → Point2(건조단) 고정 간격 [일]
    rain_buffer_days: 3    # 강우 종료 후 차단수 안정화 대기 [일]
    min_rain_mm:      1.0  # 윈도우 폐기 강수 임계값 [mm]

    # ── a2* 선택: 최솟값 가설 ─────────────────────────────────
    # 전체 후보 a2 분포에서 하위 군집만 True SHP로 인정
    # 상위값 = DHP 오염(식생 수분, 이슬, 미기록 강우)으로 과대추정
    # [a2_low_pct ~ a2_high_pct]% 구간의 median → a2*
    a2_low_pct:  0    # 하위 군집 하한 백분위수
    a2_high_pct: 10   # 하위 군집 상한 백분위수

    # ── N0* 결정 ──────────────────────────────────────────────
    # a2*를 결정한 클러스터 이벤트들의 N0 median 사용
    # → 동일한 2점 역산에서 나온 (a2_i, N0_i) 쌍을 그대로 사용 (자기 일관성)
    # → 클러스터 이벤트 수가 적으면 N0가 불안정할 수 있음 (a2_high_pct 조정으로 확보)

    min_events: 5  # 최소 유효 이벤트 수 (이하면 ValueError)
    rmse_target: "theta_field"  # or "fdr_avg"

  uts:
    # calibration_start/end: null
    # exclude_months: null
    rmse_target: "theta_field"
    nd_agg: "median"
    # parameter_sets: null

calculation:
  exclude_months: [11, 12, 1, 2, 3]
  custom_exclude_dates: []
  smoothing:
    enabled: false
    window: 11
    order: 3

visualization:
  dpi: 150
  figure_size: [18, 12]

logging:
  level: "INFO"
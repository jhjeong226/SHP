# config/processing_options.yaml
# ============================================================
# 전처리 ~ 교정 ~ 산출 전 단계의 공통 설정
# 경로, 수치 파라미터 모두 여기서 관리
# ============================================================

# ── 데이터 경로 ──────────────────────────────────────────────
# 하위 구조: {data_root}/{station_id}/raw/crnp/
#                                      raw/fdr/
#                                      processed/
data_root: "E:/02.Data/05.CRNP/03.SHP_Calibration/SHP/data"


# ── FDR 전처리 ───────────────────────────────────────────────
preprocessing:
  fdr:
    # CSV 파일 구조
    csv_header_rows: 3              # 스킵할 헤더 행 수
    csv_theta_cols: [1, 3, 5]       # 수분값 컬럼 위치 (0-index): [10cm, 20cm, 30cm]
    timestamp_format: "%m/%d/%Y %I:%M:%S %p"  # 타임스탬프 파싱 포맷

    # 필터링
    filter_on_hour: true            # true: 정각(분==0) 데이터만 유지
    theta_min: 0.0                  # 물리적 하한 (이하 → NaN)
    theta_max: 1.0                  # 물리적 상한 (이상 → NaN)

    # 일자료 산출
    min_obs_daily: 6                # 일평균 산출에 필요한 최소 시간 관측 수

  crnp:
    # 기상 변수 물리 범위 (범위 밖 → NaN)
    ta_range:  [-40,  60]           # 기온 [°C]
    rh_range:  [  0, 110]           # 상대습도 [%]
    pa_range:  [500, 1100]          # 기압 [hPa]

    # 결측 보간
    interp_method: "pchip"          # 보간 방법 (pchip / linear / nearest)
    interp_limit_hours: 24          # 최대 연속 보간 시간

    # 중성자 보정
    pressure_scale_height: 130.0    # fp 보정: 흡수 평균자유행정 L [g/cm²]
    humidity_coeff: 0.0054          # fw 보정: Rosolem et al. (2013) 계수

    # 이상치 제거 (시간자료)
    mad_threshold: 3.0              # N_corrected 시간자료 MAD 이상치 제거 배율

    # 일자료 산출
    min_obs_daily: 6                # 일평균 산출에 필요한 최소 시간 관측 수

    # 읽을 .dat 파일 패턴 (null: 폴더 내 전체 .dat)
    # 특정 파일만 읽으려면 패턴 문자열 지정 (대소문자 무시)
    # 예: 'HC_CR300Series' → 해당 문자열 포함 파일만 읽음
    dat_file_pattern: null

    # 일자료 N_corrected 절대값 필터
    # 강우/적설로 인한 비정상 저값 제거 (null: 미적용)
    # 참고: 이 사이트 정상 범위 약 900~1200 cph
    n_daily_min: null               # 예: 850 → 850 미만 일평균 NaN 처리
    n_daily_max: null               # 예: 1300 → 1300 초과 일평균 NaN 처리


# ── 중성자 보정 on/off ───────────────────────────────────────
corrections:
  incoming_flux: true   # fi: 입사 우주선 강도 보정 (NMDB)
  pressure:      true   # fp: 기압 보정
  humidity:      true   # fw: 절대습도 보정
  biomass:       false  # fb: 바이오매스 보정 (미구현)


# ── 교정 ─────────────────────────────────────────────────────
calibration:
  # 실행할 방법 목록 (나중에 shp_joint, shp_2pt 추가)
  methods: ["standard", "shp_2pt"]

  # 교정 후보 기간 — 이 기간 내 날짜 중 RMSE 최소 날짜를 자동 탐색
  candidate_start: "2024-04-01"
  candidate_end:   "2025-10-31"

  # 평가 제외 월 — 동결/적설 구간 제외 (교정 후보 탐색 및 RMSE 평가 모두 적용)
  exclude_months: [11, 12, 1, 2]

  # 사용할 FDR 깊이 (reference_depths)
  # 디폴트: [10] (10cm만 사용)
  # 다중 깊이: [10, 20, 30] → 깊이별 단순 평균 후 거리 가중
  reference_depths: [10]

  # SHP 2-point 방법 파라미터
  shp_2pt:
    dry_percentile:  10   # 후보 기간 theta_field 하위 N% → 건조 대표점
    wet_percentile:  90   # 후보 기간 theta_field 상위 N% → 습윤 대표점
    window_days:      5   # 백분위수 해당 날짜 전후 N일 평균으로 대표점 산출
    a2_min:        -0.1   # a2 유효 범위 하한 (물리적 하한)
    a2_max:         0.5   # a2 유효 범위 상한

  # Standard 방법 파라미터
  standard:
    wlat: null          # 격자수 보정값 (null이면 0.0 사용)
    wsoc: 0.01          # 유기탄소 보정값 (고정)
    initial_N0: 1000    # N0 최적화 초기값
    n0_bounds: [300, 5000]  # N0 탐색 범위


# ── VWC 산출 ─────────────────────────────────────────────────
calculation:
  exclude_months: [11, 12, 1, 2]    # 동절기 제외
  custom_exclude_dates: []           # 예: ["2024-06-15:2024-06-20"]
  smoothing:
    enabled: false
    window: 11
    order: 3


# ── 시각화 ───────────────────────────────────────────────────
visualization:
  dpi: 150
  figure_size: [18, 12]


# ── 로깅 ─────────────────────────────────────────────────────
logging:
  level: "INFO"                     # DEBUG / INFO / WARNING
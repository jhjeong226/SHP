# config/processing_options.yaml
# ============================================================
# 전처리 ~ 교정 ~ 산출 전 단계의 공통 설정
# 경로, 수치 파라미터 모두 여기서 관리
# ============================================================

# ── 데이터 경로 ──────────────────────────────────────────────
data_root: "E:/02.Data/05.CRNP/03.SHP_Calibration/SHP/data"


# ── FDR 전처리 ───────────────────────────────────────────────
preprocessing:
  fdr:
    csv_header_rows: 3
    csv_theta_cols: [1, 3, 5]
    timestamp_format: "%m/%d/%Y %I:%M:%S %p"
    filter_on_hour: true
    theta_min: 0.0
    theta_max: 1.0
    min_obs_daily: 6

  crnp:
    ta_range:  [-40,  60]
    rh_range:  [  0, 110]
    pa_range:  [800, 1300]
    interp_method: "pchip"
    interp_limit_hours: 24
    pressure_scale_height: 130.0
    humidity_coeff: 0.0054
    mad_threshold: 3.0
    min_obs_daily: 6
    dat_file_pattern: null
    n_daily_min: null
    n_daily_max: null


# ── 중성자 보정 on/off ───────────────────────────────────────
corrections:
  incoming_flux: true
  pressure:      true
  humidity:      true
  biomass:       false


# ── 교정 ─────────────────────────────────────────────────────
calibration:
  methods: ["standard", "shp_joint", "shp_2pt", "uts"]

  # ── 분석 기간 ────────────────────────────────────────────────
  # VWC를 산출할 전체 기간 (교정 파라미터를 적용해서 출력하는 범위)
  # null이면 전체 데이터 사용
  analysis_start: "2025-04-01"
  analysis_end:   "2025-10-31"

  # ── 교정 기간 ────────────────────────────────────────────────
  # 교정 파라미터(N0, a2, ND)를 결정하는 데 사용하는 기간
  # 모든 방법 공통 기본값 (방법별로 override 가능)
  # analysis_start/end 범위 안에 포함되어야 함
  calibration_start: "2025-04-01"
  calibration_end:   "2025-10-31"

  # 평가 제외 월 — 공통 기본값 (방법별 override 가능)
  # 3월 포함: 결빙이 완전히 해소되지 않은 경우가 많음
  exclude_months: [11, 12, 1, 2, 3]

  # 사용할 FDR 깊이 — 모든 방법 공통
  reference_depths: [10]

  # ── Standard (Desilets 2010) ──────────────────────────────
  standard:
    # calibration_start/end: null  # null이면 공통 calibration 기간 사용
    # exclude_months: null         # null이면 공통값 사용
    rmse_target: "theta_field"     # or "fdr_avg"
    n0_bounds: [300, 5000]

  # ── SHP-Joint ─────────────────────────────────────────────
  shp_joint:
    # calibration_start/end: null
    # exclude_months: null
    rmse_target: "theta_field"
    a2_bounds: [0.0, 0.5]
    n0_bounds: [300, 5000]

  # ── SHP 2-point ───────────────────────────────────────────
  shp_2pt:
    # calibration_start/end: null
    # exclude_months: null   # 식생 휴면기만 쓰려면 예: [3,4,5,6,7,8,11,12,1,2]
    window_days:     60
    step_days:        7
    dry_percentile:  10
    wet_percentile:  90
    min_theta_diff: 0.03
    a2_min: 0.0
    a2_max: 0.5

  # ── UTS ───────────────────────────────────────────────────
  uts:
    # calibration_start/end: null
    # exclude_months: null
    rmse_target: "theta_field"
    nd_agg: "median"
    # parameter_sets: null   # null이면 기본값 사용


# ── VWC 산출 ─────────────────────────────────────────────────
calculation:
  exclude_months: [11, 12, 1, 2, 3]
  custom_exclude_dates: []
  smoothing:
    enabled: false
    window: 11
    order: 3


# ── 시각화 ───────────────────────────────────────────────────
visualization:
  dpi: 150
  figure_size: [18, 12]


# ── 로깅 ─────────────────────────────────────────────────────
logging:
  level: "INFO"